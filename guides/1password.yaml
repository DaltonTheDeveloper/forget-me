service:
  name: 1Password
  domain: 1password.com
  website: https://1password.com
deletion:
  difficulty: medium
  estimated_time_minutes: 10
  requires_email_access: true
  requires_password: true
steps:
  - title: Sign in as the account owner
    description: Log in to your 1Password account on the web.
    url: https://my.1password.com
  - title: Open account / billing settings
    description: Only the account owner can delete the account; go to the account settings page.
    url: https://support.1password.com/delete-account/
  - title: Cancel the subscription and delete
    description: Cancel billing, then follow the delete-account steps for your plan (individual, family, or team/business owner).
  - title: Confirm
    description: Confirm deletion as prompted.
    warning: Only the account owner can delete. All items and shared vaults are permanently erased. Export anything you need first.
deletion_request:
  method: user_form
  user_form:
    url: https://support.1password.com/delete-account/
    fields:
      email: "{{email}}"
metadata:
  verified_by: "@forget-me"
  verified_date: 2026-06-30
  community_verified: true
  notes: Self-service deletion by the account owner. The linked support article covers individual, family, and team/business deletion paths.
